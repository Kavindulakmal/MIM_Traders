apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mim-traders-ingress
  namespace: mim-traders
  annotations:
    # Use the appropriate ingress class for your cluster:
    #   nginx (most common self-hosted), traefik, alb (AWS), gce (GCP)
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Uncomment below to enable TLS via cert-manager (recommended for production):
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx   # Change if using a different ingress controller
  # TLS block - uncomment and set your domain for HTTPS:
  # tls:
  #   - hosts:
  #       - mimtraders.example.com
  #     secretName: mim-traders-tls
  rules:
    - host: mimtraders.example.com   # Replace with your actual domain or IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mim-traders-service
                port:
                  number: 80
