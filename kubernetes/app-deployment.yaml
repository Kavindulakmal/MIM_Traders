---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mim-traders-app
  namespace: mim-traders
  labels:
    app: mim-traders-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mim-traders-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mim-traders-app
    spec:
      # Ensure app pods start only after MySQL is reachable
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql-service 3306; do
                echo "Waiting for MySQL...";
                sleep 3;
              done;
              echo "MySQL is up."
      containers:
        - name: mim-traders
          # Replace with your actual Docker image built from this repo.
          # Example Dockerfile: FROM php:8.2-apache; COPY . /var/www/html
          image: your-dockerhub-username/mim-traders:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: mim-traders-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: mim-traders-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mim-traders-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mim-traders-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mim-traders-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: uploaded-images
              mountPath: /var/www/html/uploaded_img
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /home.php
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /home.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: uploaded-images
          persistentVolumeClaim:
            claimName: uploaded-img-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mim-traders-service
  namespace: mim-traders
  labels:
    app: mim-traders-app
spec:
  selector:
    app: mim-traders-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: ClusterIP
