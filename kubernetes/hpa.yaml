apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mim-traders-hpa
  namespace: mim-traders
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mim-traders-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
